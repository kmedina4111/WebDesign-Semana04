<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header></header>
    <main>
        <section>
            <h1 style="color: #333;">Papas Fritas</h1>
            <p style="font-size: 18px;">Receta de Papas Fritas Casera</p>
            <img width="300" height="225" src="../img/papasfritas.jpg" alt="Papas Fritas">
        </section>
        <section>
            <h2 style="color: #666;">Ingredientes</h2>
            <ul style="font-size: 18px;">
                <li >3 o 4 papas (300g.)</li>
                <li >4 dientes de ajo</li>
                <li >Aceite de Oliva</li>
                <li >Sal</li>
            </ul>
        </section>
        <section>
            <h2 style="color: #666;">Elaboracion (Pasos)</h2>
            <ol style="font-size: 18px;">
                <li>Calentar el aceite en un sarten.</li>
                <li>Añadir papas cortadas, la sal y los ajos.</li>
                <li>Freir al gusto.</li>
                <li>Servir en plato.</li>
            </ol>
        </section>
    </main>
    <footer></footer>
</body>
</html>
